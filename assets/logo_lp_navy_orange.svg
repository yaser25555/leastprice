<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LeastPrice">
  <defs>
    <linearGradient id="lpNavy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#1B2F5E"/>
      <stop offset="100%" stop-color="#12284D"/>
    </linearGradient>
    <linearGradient id="lpOrange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#F08A33"/>
      <stop offset="100%" stop-color="#E8711A"/>
    </linearGradient>
  </defs>

  <!-- الخلفية الكحلية -->
  <circle cx="100" cy="100" r="96" fill="url(#lpNavy)"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="#0E1F3D" stroke-width="2" opacity="0.6"/>

  <!-- حلقة برتقالية ناعمة (لمسة هوية) -->
  <circle cx="100" cy="100" r="86" fill="none" stroke="#FFD9BA" stroke-width="1.5" opacity="0.35"/>

  <!-- بطاقة السعر (رمز التوفير) -->
  <g transform="translate(124, 52) rotate(18)">
    <path d="M 0 0 L 36 0 L 50 16 L 50 36 L 0 36 Z"
          fill="url(#lpOrange)"/>
    <circle cx="42" cy="10" r="3.2" fill="#12284D"/>
    <!-- سهم التخفيض داخل البطاقة -->
    <path d="M 12 12 L 12 24 M 12 24 L 8 20 M 12 24 L 16 20"
          stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- الحروف LP -->
  <text x="100" y="132" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="92" font-weight="900" fill="#FFFFFF"
        text-anchor="middle" letter-spacing="-2">LP</text>

  <!-- خط برتقالي تأكيدي تحت الحروف -->
  <rect x="62" y="146" width="76" height="4" rx="2" fill="url(#lpOrange)"/>
</svg>