<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- الخلفية الدائرية -->
  <defs>
    <linearGradient id="gradientNavy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- الدائرة الخارجية (كحلي) -->
  <circle cx="100" cy="100" r="95" fill="url(#gradientNavy)" stroke="#0F172A" stroke-width="2"/>
  
  <!-- الحروف LP بخط سميك -->
  <text x="100" y="125" font-family="Arial, sans-serif" font-size="90" font-weight="900" fill="#FF6600" text-anchor="middle" letter-spacing="5">
    LP
  </text>
  
  <!-- سلة التسوق العلوية -->
  <g transform="translate(40, 40)">
    <!-- مقبض السلة -->
    <path d="M 5 0 Q 10 -5 15 0" stroke="#FF6600" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- جسم السلة -->
    <rect x="2" y="2" width="13" height="10" rx="1" fill="none" stroke="#FF6600" stroke-width="1.5"/>
    <!-- خطوط داخل السلة -->
    <line x1="5" y1="2" x2="4" y2="12" stroke="#FF6600" stroke-width="1"/>
    <line x1="10" y1="2" x2="10" y2="12" stroke="#FF6600" stroke-width="1"/>
  </g>
  
  <!-- سلة التسوق السفلية -->
  <g transform="translate(145, 145)">
    <!-- مقبض السلة -->
    <path d="M 5 0 Q 10 -5 15 0" stroke="#FF6600" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- جسم السلة -->
    <rect x="2" y="2" width="13" height="10" rx="1" fill="none" stroke="#FF6600" stroke-width="1.5"/>
    <!-- خطوط داخل السلة -->
    <line x1="5" y1="2" x2="4" y2="12" stroke="#FF6600" stroke-width="1"/>
    <line x1="10" y1="2" x2="10" y2="12" stroke="#FF6600" stroke-width="1"/>
  </g>
</svg>