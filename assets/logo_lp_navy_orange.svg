<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LeastPrice">
  <defs>
    <linearGradient id="lpNavyBg" x1="18%" y1="0%" x2="82%" y2="100%">
      <stop offset="0%"  stop-color="#243B6B"/>
      <stop offset="55%" stop-color="#1B2F5E"/>
      <stop offset="100%" stop-color="#0E1F3D"/>
    </linearGradient>
    <radialGradient id="lpNavyGlow" cx="30%" cy="24%" r="55%">
      <stop offset="0%"  stop-color="#3B5694" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0E1F3D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lpOrangeFg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#FFA052"/>
      <stop offset="55%" stop-color="#F08A33"/>
      <stop offset="100%" stop-color="#D9620B"/>
    </linearGradient>
  </defs>

  <!-- خلفية كحلية بتدرج قطري -->
  <circle cx="100" cy="100" r="96" fill="url(#lpNavyBg)"/>
  <!-- وهج علوي ناعم لإحساس العمق -->
  <circle cx="100" cy="100" r="96" fill="url(#lpNavyGlow)"/>
  <!-- حلقة برتقالية رفيعة (لمسة هوية) -->
  <circle cx="100" cy="100" r="86" fill="none" stroke="url(#lpOrangeFg)"
          stroke-width="1.6" opacity="0.55"/>

  <!-- الحروف LP بتدرج برتقالي -->
  <text x="100" y="138"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="100" font-weight="900"
        fill="url(#lpOrangeFg)"
        text-anchor="middle" letter-spacing="-3">LP</text>

  <!-- خط تأكيدي برتقالي قصير تحت الحروف -->
  <rect x="68" y="150" width="64" height="3.5" rx="1.75" fill="url(#lpOrangeFg)"/>
</svg>