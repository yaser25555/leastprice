<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LeastPrice">
  <defs>
    <linearGradient id="bgGradient" x1="18%" y1="0%" x2="82%" y2="100%">
      <stop offset="0%"  stop-color="#243B6B"/>
      <stop offset="55%" stop-color="#1B2F5E"/>
      <stop offset="100%" stop-color="#0E1F3D"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="30%" cy="24%" r="55%">
      <stop offset="0%"  stop-color="#3B5694" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0E1F3D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#FFA052"/>
      <stop offset="55%" stop-color="#F08A33"/>
      <stop offset="100%" stop-color="#D9620B"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0A1A36" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- خلفية كحلية متدرجة برأس مربع مدوّر -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bgGradient)"/>
  <!-- وهج ناعم لإحساس العمق -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bgGlow)"/>

  <!-- إطار برتقالي رفيع كلمسة هوية -->
  <rect x="20" y="20" width="472" height="472" rx="98" ry="98"
        fill="none" stroke="url(#orangeGradient)" stroke-width="2.2" opacity="0.55"/>

  <!-- الحروف LP بتدرج برتقالي -->
  <text x="256" y="346"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="276" font-weight="900"
        fill="url(#orangeGradient)" text-anchor="middle" letter-spacing="-8"
        filter="url(#softShadow)">LP</text>

  <!-- خط تأكيدي برتقالي تحت الحروف -->
  <rect x="186" y="384" width="140" height="8" rx="4" fill="url(#orangeGradient)"/>
</svg>
