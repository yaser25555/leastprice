<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LeastPrice">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#1B2F5E"/>
      <stop offset="100%" stop-color="#12284D"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#F08A33"/>
      <stop offset="100%" stop-color="#E8711A"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0A1A36" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- الخلفية الكحلية -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bgGradient)"/>

  <!-- إطار برتقالي ناعم لتأكيد الهوية -->
  <rect x="14" y="14" width="484" height="484" rx="86" ry="86"
        fill="none" stroke="#FFD9BA" stroke-width="2" opacity="0.25"/>

  <!-- بطاقة السعر (رمز التوفير) -->
  <g transform="translate(310, 118) rotate(18)" filter="url(#softShadow)">
    <path d="M 0 0 L 96 0 L 132 36 L 132 96 L 0 96 Z"
          fill="url(#orangeGradient)"/>
    <circle cx="110" cy="26" r="9" fill="#12284D"/>
    <!-- سهم نزولي يشير إلى أرخص سعر -->
    <path d="M 32 30 L 32 70 M 32 70 L 22 60 M 32 70 L 42 60"
          stroke="#FFFFFF" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- الحروف LP الرئيسية -->
  <text x="256" y="346"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="248" font-weight="900"
        fill="#FFFFFF" text-anchor="middle" letter-spacing="-6"
        filter="url(#softShadow)">LP</text>

  <!-- خط برتقالي تحت الحروف -->
  <rect x="156" y="380" width="200" height="10" rx="5" fill="url(#orangeGradient)"/>

  <!-- اسم العلامة بالكامل -->
  <text x="256" y="438"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="36" font-weight="700" letter-spacing="6"
        fill="#FFD9BA" text-anchor="middle">LEASTPRICE</text>
</svg>
    
    <!-- تدرج اللمعان للشخصية -->
    <linearGradient id="shineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.35" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </linearGradient>
    
    <!-- تدرج برتقالي غامق للنجوم -->
    <linearGradient id="starGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D94E00;stop-opacity:1" />
    </linearGradient>
    
    <!-- تدرج أزرق للسروال والحذاء -->
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>
    
    <!-- تدرج أزرق للنجوم المتناثرة -->
    <linearGradient id="blueStarGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    
    <!-- تدرج أحمر للنجوم المتناثرة -->
    <linearGradient id="redStarGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B91C1C;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    
    <!-- فلتر الإشعاع (Glow) للنجوم -->
    <filter id="starGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- الخلفية المستطيلة الكحلية -->
  <rect x="0" y="0" width="512" height="512" rx="80" ry="80" fill="url(#bgGradient)"/>
  
  <!-- نقاط ضوء في الخلفية -->
  <g opacity="0.1" fill="white">
    <circle cx="100" cy="100" r="60"/>
    <circle cx="400" cy="380" r="80"/>
  </g>
  
  <!--============= الشخصية الكرتونية البرتقالية =============-->
  <g transform="translate(256, 245) scale(1.15) translate(-256, -245)">
  
  <!-- الرأس (دائري وكبير) -->
  <circle cx="256" cy="150" r="60" fill="url(#bodyGradient)" filter="url(#shadow)"/>
  <!-- لمعة الرأس -->
  <ellipse cx="240" cy="130" rx="35" ry="25" fill="url(#shineGradient)"/>
  
  <!-- الأذنان (أسفل الرأس قليلاً) -->
  <circle cx="200" cy="120" r="22" fill="url(#bodyGradient)" filter="url(#shadow)"/>
  <ellipse cx="190" cy="110" rx="12" ry="8" fill="url(#shineGradient)"/>
  <circle cx="312" cy="120" r="22" fill="url(#bodyGradient)" filter="url(#shadow)"/>
  <ellipse cx="322" cy="110" rx="12" ry="8" fill="url(#shineGradient)"/>
  
  <!-- العينان البيضاوان الكبيرة (لطيفة وملهمة) -->
  <ellipse cx="235" cy="140" rx="16" ry="20" fill="white" filter="url(#shadow)"/>
  <ellipse cx="277" cy="140" rx="16" ry="20" fill="white" filter="url(#shadow)"/>
  
  <!-- بؤبؤ العين السوداء (مع نظرة إلى الأعلى بأمل) -->
  <circle cx="238" cy="138" r="10" fill="#000000"/>
  <circle cx="280" cy="138" r="10" fill="#000000"/>
  
  <!-- لمعة براقة في العين (تعطي حياة) -->
  <circle cx="240" cy="136" r="4" fill="white" opacity="0.9"/>
  <circle cx="282" cy="136" r="4" fill="white" opacity="0.9"/>
  
  <!-- الخدود الوردية (دلالة الابتسامة والفرح) -->
  <ellipse cx="190" cy="165" rx="18" ry="14" fill="#FF9999" opacity="0.6"/>
  <ellipse cx="322" cy="165" rx="18" ry="14" fill="#FF9999" opacity="0.6"/>
  
  <!-- الفم المبتسم الكبير والدافئ جداً -->
  <path d="M 238 172 Q 256 196 274 172" stroke="white" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- خط داخلي للفم لإضافة عمق -->
  <path d="M 242 175 Q 256 188 270 175" stroke="#FFD700" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  
  <!-- الجسم (بيضاوي) -->
  <ellipse cx="256" cy="245" rx="48" ry="60" fill="url(#bodyGradient)" filter="url(#shadow)"/>
  <!-- لمعة الجسم -->
  <ellipse cx="235" cy="220" rx="28" ry="35" fill="url(#shineGradient)"/>
  
  <!-- الساق اليسرى -->
  <line x1="230" y1="300" x2="225" y2="360" stroke="url(#bodyGradient)" stroke-width="18" stroke-linecap="round"/>
  <ellipse cx="225" cy="370" rx="14" ry="12" fill="url(#bodyGradient)"/>
  <ellipse cx="218" cy="365" rx="8" ry="5" fill="url(#shineGradient)"/>
  
  <!-- الساق اليمنى -->
  <line x1="282" y1="300" x2="287" y2="360" stroke="url(#bodyGradient)" stroke-width="18" stroke-linecap="round"/>
  <ellipse cx="287" cy="370" rx="14" ry="12" fill="url(#bodyGradient)"/>
  <ellipse cx="294" cy="365" rx="8" ry="5" fill="url(#shineGradient)"/>
  
  <!-- الذراع اليسرى أفقية احتفالية -->
  <g>
    <line x1="215" y1="225" x2="130" y2="225" stroke="url(#bodyGradient)" stroke-width="20" stroke-linecap="round"/>
    <circle cx="125" cy="225" r="18" fill="url(#bodyGradient)" filter="url(#shadow)"/>
    <ellipse cx="115" cy="218" rx="10" ry="7" fill="url(#shineGradient)"/>
  </g>
  
  <!-- الذراع اليمنى أفقية احتفالية -->
  <g>
    <line x1="297" y1="225" x2="382" y2="225" stroke="url(#bodyGradient)" stroke-width="20" stroke-linecap="round"/>
    <circle cx="387" cy="225" r="18" fill="url(#bodyGradient)" filter="url(#shadow)"/>
    <ellipse cx="397" cy="218" rx="10" ry="7" fill="url(#shineGradient)"/>
  </g>
  </g>
  
  <!--============= النجوم والعناصر الملهمة =============-->
  
  <g transform="translate(256, 256) scale(1.12) translate(-256, -256)">
  
  <!-- نجم كبير في الأعلى (الحلم) -->
  <g fill="url(#starGradient)" filter="url(#starGlow)">
    <path d="M 256 60 L 263 85 L 290 85 L 270 102 L 277 127 L 256 110 L 235 127 L 242 102 L 222 85 L 249 85 Z"/>
  </g>
  
  <!-- نجوم صغيرة حول الشخصية بإضاءة قوية -->
  <g filter="url(#starGlow)">
    <path d="M 120 90 L 124 100 L 135 100 L 126 106 L 130 116 L 120 110 L 110 116 L 114 106 L 105 100 L 116 100 Z" fill="url(#blueStarGradient)"/>
    <path d="M 392 90 L 396 100 L 407 100 L 398 106 L 402 116 L 392 110 L 382 116 L 386 106 L 377 100 L 388 100 Z" fill="url(#redStarGradient)"/>
    <path d="M 140 320 L 144 330 L 155 330 L 146 336 L 150 346 L 140 340 L 130 346 L 134 336 L 125 330 L 136 330 Z" fill="url(#blueStarGradient)"/>
    <path d="M 372 320 L 376 330 L 387 330 L 378 336 L 382 346 L 372 340 L 362 346 L 366 336 L 357 330 L 368 330 Z" fill="url(#redStarGradient)"/>
  </g>
  
  <!-- نجوم إضافية صغيرة جداً بين النجوم الكبيرة (تأثير براق) -->
  <g filter="url(#starGlow)" opacity="0.9">
    <path d="M 180 120 L 183 128 L 192 128 L 185 133 L 188 141 L 180 136 L 172 141 L 175 133 L 168 128 L 177 128 Z" fill="url(#blueStarGradient)"/>
    <path d="M 332 120 L 335 128 L 344 128 L 337 133 L 340 141 L 332 136 L 324 141 L 327 133 L 320 128 L 329 128 Z" fill="url(#redStarGradient)"/>
    <path d="M 195 280 L 198 288 L 207 288 L 200 293 L 203 301 L 195 296 L 187 301 L 190 293 L 183 288 L 192 288 Z" fill="url(#blueStarGradient)"/>
    <path d="M 317 280 L 320 288 L 329 288 L 322 293 L 325 301 L 317 296 L 309 301 L 312 293 L 305 288 L 314 288 Z" fill="url(#redStarGradient)"/>
  </g>
  
  </g>
  
  <!-- نص العلامة التجارية المقوس مثل اللافتة فوق الشخصية -->
  <g transform="translate(256, 60) scale(1.15) translate(-256, -60)">
    <!-- L -->
    <text x="140" y="100" font-size="26" font-weight="900" fill="#FFD700" font-family="Arial, sans-serif" style="text-transform: uppercase; font-style: italic;" transform="rotate(-35 140 130)">L</text>
    <!-- E -->
    <text x="165" y="85" font-size="26" font-weight="900" fill="#FFD700" font-family="Arial, sans-serif" style="text-transform: uppercase; font-style: italic;" transform="rotate(-20 165 115)">E</text>
    <!-- A -->
    <text x="190" y="75" font-size="26" font-weight="900" fill="#FFD700" font-family="Arial, sans-serif" style="text-transform: uppercase; font-style: italic;" transform="rotate(-8 190 105)">A</text>
    <!-- S -->
    <text x="215" y="70" font-size="26" font-weight="900" fill="#FFD700" font-family="Arial, sans-serif" style="text-transform: uppercase; font-style: italic;" transform="rotate(0 215 100)">S</text>
    <!-- T -->
    <text x="240" y="68" font-size="26" font-weight="900" fill="#FFD700" font-family="Arial, sans-serif" style="text-transform: uppercase; font-style: italic;" transform="rotate(8 240 98)">T</text>
    <!-- P -->
    <text x="265" y="70" font-size="26" font-weight="900" fill="#FFD700" font-family="Arial, sans-serif" style="text-transform: uppercase; font-style: italic;" transform="rotate(15 265 100)">P</text>
    <!-- R -->
    <text x="288" y="75" font-size="26" font-weight="900" fill="#FFD700" font-family="Arial, sans-serif" style="text-transform: uppercase; font-style: italic;" transform="rotate(22 288 105)">R</text>
    <!-- I -->
    <text x="308" y="83" font-size="26" font-weight="900" fill="#FFD700" font-family="Arial, sans-serif" style="text-transform: uppercase; font-style: italic;" transform="rotate(32 308 113)">I</text>
    <!-- C -->
    <text x="325" y="95" font-size="26" font-weight="900" fill="#FFD700" font-family="Arial, sans-serif" style="text-transform: uppercase; font-style: italic;" transform="rotate(42 325 125)">C</text>
    <!-- E -->
    <text x="338" y="110" font-size="26" font-weight="900" fill="#FFD700" font-family="Arial, sans-serif" style="text-transform: uppercase; font-style: italic;" transform="rotate(55 338 140)">E</text>
  </g>
  
  <!-- الحد الخارجي الملون -->
  <rect x="2" y="2" width="508" height="508" rx="78" ry="78" fill="none" stroke="rgba(255, 165, 0, 0.3)" stroke-width="3"/>
</svg>