name: leastprice
description: LeastPrice Flutter application
publish_to: "none"
version: 1.0.1+3

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cloud_firestore: ^6.1.3
  connectivity_plus: ^7.1.0
  firebase_auth: ^6.1.1
  firebase_core: ^4.6.0
  firebase_storage: ^13.0.3
  http: ^1.2.2
  image_picker: ^1.1.2
  shared_preferences: ^2.3.3
  share_plus: ^10.0.2
  url_launcher: ^6.3.0
  flutter_riverpod: ^3.3.1
  geolocator: ^13.0.2
  geocoding: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/products.json
    - assets/icons/logo_lp_navy_orange.png
