name: Deploy LeastPrice Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: >
          flutter build web --release --base-href /leastprice/ 
          --dart-define=SERPAPI_KEY="$SERPAPI_KEY" 
          --dart-define=SERPER_API_KEY="$SERPER_API_KEY" 
          --dart-define=ADMIN_PASSWORD="$ADMIN_PASSWORD" 
          --dart-define=TAVILY_API_KEY="$TAVILY_API_KEY"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
