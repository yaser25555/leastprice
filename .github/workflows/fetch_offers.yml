name: Automated Daily Offers Fetcher

on:
  schedule:
    # Runs every Thursday at 00:00 UTC (3:00 AM Saudi Time)
    - cron: '0 0 * * 4'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  fetch_offers:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 firebase-admin

    - name: Write Firebase service account
      env:
        FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      run: |
        python - <<'PY'
        import os
        from pathlib import Path

        payload = os.environ["FIREBASE_SERVICE_ACCOUNT_JSON"]
        target = Path(os.environ["RUNNER_TEMP"]) / "leastprice-service-account.json"
        target.write_text(payload, encoding="utf-8")

        github_env = Path(os.environ["GITHUB_ENV"])
        with github_env.open("a", encoding="utf-8") as handle:
            handle.write(f"GOOGLE_APPLICATION_CREDENTIALS={target}\n")
        PY
        
    - name: Run Scraper Bot
      env:
        PYTHONIOENCODING: "utf8"
      run: python scripts/daily_offers_fetcher.py
