name: Deploy LeastPrice Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy-hosting:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (Firebase Hosting)
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: >
          flutter build web --release 
          --dart-define=SERPAPI_KEY="$SERPAPI_KEY" 
          --dart-define=SERPER_API_KEY="$SERPER_API_KEY" 
          --dart-define=ADMIN_PASSWORD="$ADMIN_PASSWORD" 
          --dart-define=TAVILY_API_KEY="$TAVILY_API_KEY"

      - name: Setup Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing secret FIREBASE_SERVICE_ACCOUNT_JSON."
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/leastprice"
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/leastprice/service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/leastprice/service-account.json" >> "$GITHUB_ENV"

      - name: Install Firebase CLI
        run: npm i -g firebase-tools

      - name: Deploy Firebase Hosting
        run: firebase deploy --only hosting --project leastprice-yaser

