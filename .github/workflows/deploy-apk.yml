name: Deploy LeastPrice APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Prepare stable APK name
        run: cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/leastprice.apk

      - name: Publish GitHub Release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: Latest APK
          files: build/app/outputs/flutter-apk/leastprice.apk

