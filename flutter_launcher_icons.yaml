    generate: true
    image_path: "assets/icons/app_icon_navy_1024.png"
    background_color: "#1B2F5E"
    theme_color: "#1B2F5E"
  windows:
    generate: true
    image_path: "assets/icons/app_icon_navy_1024.png"
    icon_size: 256

