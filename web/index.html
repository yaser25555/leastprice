<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="leastprice">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>أرخص سعر | LeastPrice</title>
  <meta name="description" content="مقارنة أسعار المنتجات في السوق السعودي - LeastPrice">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#E8711A">
</head>
<body>
  <script>
    // Force service worker update on every load
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        var updatePromises = registrations.map(function(reg) {
          return reg.update();
        });
        return Promise.all(updatePromises);
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
